<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Mental Health Tracker</title>
  <link rel="stylesheet" href="reset-password.css" />
</head>
<body>
  <div class="auth-container">
    <h1>Mental Health Tracker</h1>
    <h2>Reset Password</h2>

    <p class="forgot-description">
      Enter the reset code sent for verification and choose a new password.
    </p>

    <form id="resetForm">
      <input
        type="email"
        id="email"
        placeholder="Account email"
        readonly
      />

      <input
        type="text"
        id="resetOtp"
        placeholder="Enter 6-digit reset code"
        required
      />

      <div class="password-field">
        <input
          type="password"
          id="newPassword"
          placeholder="Enter new password"
          required
        />
<button
  type="button"
  id="toggleNewPassword"
  class="eye-button"
>
  <img
    id="newPasswordEye"
    src="./assets/icons/eye-close-svgrepo-com.svg"
    alt=""
    class="eye-icon"
  >
</button>
      </div>

      <div class="password-field">
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
          required
        />
<button
  type="button"
  id="toggleConfirmPassword"
  class="eye-button"
>
  <img
    id="confirmPasswordEye"
    src="./assets/icons/eye-close-svgrepo-com.svg"
    alt=""
    class="eye-icon"
  >
</button>
      </div>

      <button type="submit">Reset Password</button>
    </form>

    <p id="message"></p>

    <p class="auth-switch">
      Back to <a href="login.html?from=landing">Login</a>
    </p>
  </div>


  <script src="auth.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
