<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Assistant - Mental Health Tracker</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div>
        <h1>Lumi</h1>
        <p class="subtitle">Your AI companion for emotional wellness</p>
      </div>

      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </header>

    <section class="chat-box">
      <div id="chatMessages" class="chat-messages">
        <div class="message assistant-message">
          Hi, I’m Lumi. You can talk to me about stress, mood, motivation, or how your day has been going.
        </div>
      </div>

      <form id="chatForm" class="chat-input-area">
        <input
          type="text"
          id="chatInput"
          placeholder="Type how you're feeling..."
          required
        />
        <button type="submit">Send</button>
      </form>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="chat.js"></script>
</body>
</html>
